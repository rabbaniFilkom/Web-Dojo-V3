<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa — Dojo Yudhistira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { primary: '#0F172A', secondary: '#3B82F6' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-blue-200/20 rounded-full blur-[100px]"></div>
        <div class="absolute top-[40%] -right-[10%] w-[40%] h-[40%] bg-amber-200/20 rounded-full blur-[100px]"></div>
    </div>

    <div class="bg-white w-full max-w-md p-8 md:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 relative z-10 border border-slate-100">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-50 rounded-2xl mb-6 text-secondary">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-primary mb-2">Portal Atlet</h1>
            <p class="text-slate-400 text-sm font-medium">Masukan ID Anggota untuk mengakses materi Kelas Prestasi.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-900 uppercase tracking-widest ml-2">Nama Singkat</label>
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-secondary transition-colors">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <input type="text" id="username" placeholder="Contoh: ATLET01" 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-sm font-bold text-primary placeholder:text-slate-300 focus:outline-none focus:border-secondary focus:bg-white transition-all"
                        required
                    >
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-900 uppercase tracking-widest ml-2">ID Anggota</label>
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-secondary transition-colors">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-sm font-bold text-primary placeholder:text-slate-300 focus:outline-none focus:border-secondary focus:bg-white transition-all"
                        required
                    >
                </div>
            </div>

            <div id="errorMessage" class="hidden p-3 bg-red-50 text-red-500 text-xs font-bold rounded-xl text-center flex items-center justify-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4"></i> ID atau Kata Sandi salah!
            </div>

            <button type="submit" class="w-full bg-primary text-white py-4 rounded-2xl font-bold text-sm hover:bg-secondary hover:shadow-lg hover:shadow-blue-500/30 active:scale-95 transition-all flex justify-center items-center gap-2 mt-4">
                <span id="btnText">MASUK PORTAL</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>

        </form>

        <div class="mt-8 text-center">
            <a href="../index.html" class="text-xs font-bold text-slate-400 hover:text-primary transition-colors">Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMessage');
        const btnText = document.getElementById('btnText');

        // DAFTAR 32 NIKH KOHAI (Sesuai List yang Kamu Berikan)
        const daftarNIKH = [
            "K.2505A SR", "K.2510ANP", "K.2505AFR", "K.2507AFM", "K.2505AN",
            "K.2507FA", "K.2505FAA", "K.2505KRD", "K.2507KTR", "K.2507MGS",
            "K.2509MKPR", "K.2507AFD", "K.2510MIEL", "K.2512TAK", "K.2507MFA",
            "K.2505MAS", "K.2510MA", "K.2512CKK", "K.2509MIF", "K.2510MWAB",
            "K.2507NY", "K.2507QAN", "K.2505QFR", "K.2507RAZW", "K.2507RRRSS",
            "K.2505RAM", "K.2507SPC", "K.2507SNF", "K.2507SK", "K.2507SZH",
            "K.25011SH", "K.2511KMZ", "COACH1", "COACH2", "COACH3" 
        ];

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const inputNama = document.getElementById('username').value.trim();
            // Password diisi NIKH (contoh: K.2510ANP)
            const inputID = document.getElementById('password').value.toUpperCase().trim();

            btnText.innerText = "VALIDASI DATA...";
            errorMsg.classList.add('hidden');
            
            setTimeout(() => {
                // Logika pengecekan ID
                const idValid = daftarNIKH.includes(inputID);

                if (idValid) {
                    // Berhasil Login
                    localStorage.setItem('isAthleteLoggedIn', 'true');
                    // Simpan nama acak yang mereka masukkan agar bisa disapa di dashboard
                    localStorage.setItem('athleteName', inputNama || "Kohai");
                    localStorage.setItem('athleteID', inputID);

                    // Arahkan ke dashboard
                    window.location.href = './kelasAtlit/Dashboard-atlit.html'; 
                } else {
                    // Gagal Login
                    errorMsg.classList.remove('hidden');
                    btnText.innerText = "MASUK PORTAL";
                    
                    // Feedback visual jika salah
                    const passInput = document.getElementById('password');
                    passInput.classList.add('border-red-500');
                    setTimeout(() => passInput.classList.remove('border-red-500'), 1000);
                }
            }, 800);
        });
    </script>
</body>
</html>
