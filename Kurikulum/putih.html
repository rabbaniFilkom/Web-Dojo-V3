<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Materi Latihan — Dojo Yudhistira Academy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'], 
                        display: ['"Space Grotesk"', 'sans-serif'] 
                    },
                    colors: { primary: '#0F172A', secondary: '#3B82F6', muted: '#64748B', surface: '#FFFFFF' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #F8FAFC; color: #0F172A; -webkit-font-smoothing: antialiased; }
        
        /* Cinema Mode Effect */
        .video-wrapper {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.25);
            position: relative;
        }

        .video-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            pointer-events: none;
        }

        /* Glassmorphism Playlist */
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Active State Animation */
        .tab-active { 
            background: #0F172A !important; 
            color: white !important; 
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
        }

        .lesson-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .lesson-item.active {
            background: white;
            border-color: #3B82F6;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.15);
            transform: scale(1.02);
        }

        /* Custom Scrollbar */
        #playlist::-webkit-scrollbar { width: 4px; }
        #playlist::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-blue-100 selection:text-blue-600">

    <nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl border-b border-slate-100 h-16 md:h-20 flex items-center">
        <div class="max-w-[1440px] mx-auto px-6 w-full flex justify-between items-center">
            <a href="/onlinedojo.html" class="group flex items-center gap-3 text-[10px] font-extrabold tracking-[0.2em] text-slate-400 hover:text-primary transition-all">
                <div class="p-2 bg-slate-100 rounded-lg group-hover:bg-primary group-hover:text-white transition-colors">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i>
                </div>
                KEMBALI KE ACADEMY
            </a>
            
            <div class="hidden md:flex flex-col items-center">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-8 h-1 bg-slate-200 rounded-full overflow-hidden">
                        <div class="w-1/3 h-full bg-secondary"></div>
                    </div>
                    <span class="text-[9px] font-black text-slate-400 tracking-widest uppercase">Progress: 12%</span>
                </div>
                <h2 class="font-display font-bold text-sm text-primary tracking-tight uppercase">Materi Sabuk Putih</h2>
            </div>

            <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                    <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 md:pt-32 pb-20">
        <div class="max-w-[1440px] mx-auto px-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                <div class="lg:col-span-8 space-y-8">
                    <div class="video-wrapper group">
                        <iframe id="main-video" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                        <div class="video-overlay absolute inset-0"></div>
                    </div>

                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm relative overflow-hidden">
                        <div class="absolute -top-10 -right-10 opacity-[0.02]">
                            <i data-lucide="shield" class="w-48 h-48"></i>
                        </div>

                        <div class="relative z-10">
                            <div class="flex flex-wrap items-center gap-3 mb-6">
                                <span id="main-category" class="px-4 py-1.5 bg-blue-50 text-blue-600 text-[10px] font-extrabold rounded-full uppercase tracking-widest">Kategori</span>
                                <span class="px-4 py-1.5 bg-slate-50 text-slate-400 text-[10px] font-extrabold rounded-full uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="clock" class="w-3 h-3"></i> 04:20 Menit
                                </span>
                            </div>
                            
                            <h1 id="main-title" class="font-display font-bold text-3xl md:text-5xl text-primary leading-tight">Pilih Materi Latihan</h1>
                            <p id="main-desc" class="mt-8 text-slate-500 text-base leading-relaxed max-w-3xl font-medium">
                                Selamat datang di dashboard video eksklusif. Silakan pilih salah satu teknik di samping untuk memulai pendalaman materi. Fokus pada detail gerakan dan pernapasan.
                            </p>
                            
                            <div class="mt-10 pt-8 border-t border-slate-50 flex items-center gap-6">
                                <button class="flex items-center gap-3 px-6 py-3 bg-primary text-white rounded-2xl font-bold text-xs hover:bg-secondary transition-all active:scale-95 shadow-lg shadow-slate-900/10">
                                    Tandai Sudah Selesai <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                                </button>
                                <button class="text-slate-400 hover:text-primary transition-colors">
                                    <i data-lucide="share-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4 sticky top-28">
                    <div class="glass-sidebar rounded-[2.5rem] p-6 shadow-xl shadow-slate-200/50">
                        <h3 class="font-display font-bold text-lg text-primary mb-6 px-2">Daftar Modul</h3>
                        
                        <div class="flex p-1.5 bg-slate-200/50 rounded-2xl mb-8">
                            <button onclick="renderPlaylist('kihon')" id="btn-kihon" class="tab-btn flex-1 py-3 text-[10px] font-bold uppercase rounded-xl transition-all tracking-widest text-slate-500">Kihon</button>
                            <button onclick="renderPlaylist('kata')" id="btn-kata" class="tab-btn flex-1 py-3 text-[10px] font-bold uppercase rounded-xl transition-all tracking-widest text-slate-500">Kata</button>
                            <button onclick="renderPlaylist('kumite')" id="btn-kumite" class="tab-btn flex-1 py-3 text-[10px] font-bold uppercase rounded-xl transition-all tracking-widest text-slate-500">Kumite</button>
                        </div>

                        <div id="playlist" class="space-y-4 max-h-[500px] overflow-y-auto px-2 pb-4">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // DATABASE MATERI (Tetap Mudah Diedit)
        const databaseMateri = {
            kihon: [
                { title: "Gedan Barai", videoId: "dQw4w9WgXcQ", desc: "Pukulan melangkah maju ke arah ulu hati. Fokus pada koordinasi antara putaran pinggul, dorongan kaki belakang, dan hikite tangan.", duration: "03:15" },
                { title: "Age Uke", videoId: "dQw4w9WgXcQ", desc: "Tangkisan ke arah atas kepala. Tangan membentuk sudut 45 derajat untuk membelokkan serangan lawan.", duration: "02:40" },
                { title: "Shoto Uke", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" },
                { title: "Uchi Uke", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" },
                { title: "Shuto Uke", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" },
                { title: "Chudan Uke", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" },
                { title: "Jodan Uke", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" },
                { title: "Mae Geri Uke", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" },
                { title: "Keange Geri", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" },
                { title: "Kekomi Geri", videoId: "dQw4w9WgXcQ", desc: "Tendangan depan dasar dengan sentakan kaki. Gunakan 'Koshi' (bola kaki) untuk dampak maksimal.", duration: "04:10" }
            ],
            kata: [
                { title: "Heian Shodan", videoId: "dQw4w9WgXcQ", desc: "Jurus pertama. Meliputi 20 gerakan yang fokus pada kuda-kuda Zenkutsu Dachi dan Kokutsu Dachi.", duration: "05:50" },
                { title: "Heian Nidan", videoId: "dQw4w9WgXcQ", desc: "Jurus pertama. Meliputi 20 gerakan yang fokus pada kuda-kuda Zenkutsu Dachi dan Kokutsu Dachi.", duration: "05:50" }
            ],
            kumite: [
                { title: "Kizami Zuki", videoId: "dQw4w9WgXcQ", desc: "Pukulan depan cepat yang digunakan untuk memecah pertahanan lawan atau mencetak poin cepat.", duration: "02:20" }
            ]
        };

        function renderPlaylist(category) {
            const container = document.getElementById('playlist');
            const data = databaseMateri[category];
            container.innerHTML = '';

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + category).classList.add('tab-active');

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `lesson-item group p-5 rounded-3xl border border-transparent bg-white/40 hover:bg-white flex items-center gap-5 cursor-pointer border-slate-100`;
                card.innerHTML = `
                    <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shrink-0 group-hover:bg-secondary transition-all shadow-lg shadow-slate-900/5">
                        <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-primary leading-tight mb-1">${item.title}</h4>
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${category}</span>
                            <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
                            <span class="text-[9px] font-bold text-slate-400 uppercase">${item.duration}</span>
                        </div>
                    </div>
                `;
                card.onclick = (e) => {
                    playVideo(item, category);
                    document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
                    card.classList.add('active');
                };
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function playVideo(item, category) {
            // GSAP Smooth Transition for content
            gsap.to("#main-video, #main-title, #main-desc", { opacity: 0, y: 10, duration: 0.3, onComplete: () => {
                document.getElementById('main-video').src = `https://www.youtube.com/embed/${item.videoId}?autoplay=1&rel=0&modestbranding=1`;
                document.getElementById('main-title').innerText = item.title;
                document.getElementById('main-desc').innerText = item.desc;
                document.getElementById('main-category').innerText = category;
                gsap.to("#main-video, #main-title, #main-desc", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" });
            }});
        }

        window.onload = () => renderPlaylist('kihon');
        lucide.createIcons();
    </script>
</body>
</html>
